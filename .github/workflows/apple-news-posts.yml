name: Apple RSS → Hugo posts

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apple-news-posts
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Quét RSS và tạo bài
        run: python3 scripts/apple_news_to_hugo.py

      - name: Commit và push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/post data/apple-feed-state.json
          if git diff --staged --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "chore(content): bài tự động từ Apple RSS (Xcode / chính sách)"
            git push
          fi
